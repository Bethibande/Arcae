replicaCount: 1

image:
  repository: bethibande/arcae
  pullPolicy: IfNotPresent
  tag: "1.1"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Will create a role and role binding for the service account
# Required for service discovery and more
rbac:
  create: true

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  managementPort: 8081

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

httpRoute:
  enabled: false
  parentRefs: []
  #  - name: my-gateway
  #    namespace: default
  #    sectionName: http
  hostnames: []
  #  - arcae.local
  annotations: {}

resources: {}
  # limits:
  #   cpu: 1000m
  #   memory: 150Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# JVM Options
jvm:
  # Sets the maximum heap size (-Xmx) for the JVM
  memoryLimit: "100m"
  # Optional: Allows overriding the entire JAVA_OPTIONS env or adding extra flags
  javaOptions: ""

# Additional environment variables
extraEnv: []
#  - name: MY_ENV_VAR
#    value: "some-value"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

externalConfig:
  # The external hostname where users can find the frontend.
  # This is used to generate URLs
  host: "http://localhost:8080"
  database:
    url: "jdbc:postgresql://postgres:5432/arcae"
    username: "arcae"
    password: "password"
  search:
    enabled: true
    hosts: "elastic:9200"

networkPolicy:
  enabled: true
  # Allow ingress from ingress-controller or other namespaces if needed.
  # By default, we'll allow all within the namespace for simplicity in this template,
  # but it can be restricted further.
  # Ingress on the management port is always forbidden.
  allowExternal: true
