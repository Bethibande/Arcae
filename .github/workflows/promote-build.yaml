name: Promote Multi-Arch Image

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'The existing tag to promote (e.g. 1.2.2-PRE1)'
        required: true
        type: string
      new_version:
        description: 'The new version tag to create (e.g. 1.2.2)'
        required: true
        type: string
      promote_to_latest:
        description: 'Also update the "latest" tag?'
        required: true
        type: boolean
        default: true

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Install Crane
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz | tar xz crane
          sudo mv crane /usr/local/bin/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Personal Registry
        uses: docker/login-action@v3
        with:
          registry: docker.bethibande.com
          username: ${{ secrets.REPOSITORY_USERNAME }}
          password: ${{ secrets.REPOSITORY_TOKEN }}

      # --- PROMOTE TO DOCKER HUB ---
      - name: Promote to Docker Hub (Versioned)
        run: |
          crane copy bethibande/arcae:${{ inputs.source_tag }} \
                     bethibande/arcae:${{ inputs.new_version }}

      - name: Promote to Docker Hub (Latest)
        if: ${{ inputs.promote_to_latest }}
        run: |
          crane copy bethibande/arcae:${{ inputs.new_version }} \
                     bethibande/arcae:latest

      # --- PROMOTE TO PERSONAL REGISTRY ---
      - name: Promote to Personal Registry (Versioned)
        run: |
          crane copy bethibande/arcae:${{ inputs.new_version }} \
                     docker.bethibande.com/bethibande/arcae:${{ inputs.new_version }}

      - name: Promote to Personal Registry (Latest)
        if: ${{ inputs.promote_to_latest }}
        run: |
          crane copy bethibande/arcae:${{ inputs.new_version }} \
                     docker.bethibande.com/bethibande/arcae:latest
