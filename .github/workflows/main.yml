name: Manual Multi-Arch Native Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version (e.g., 1.0.0)'
        required: true
        default: 'latest'

jobs:
  build:
    name: Build Native Image
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Arch-Specific Image
        # We use your exact command, but override the tag to include the architecture
        run: |
          ./gradlew :server:build \
            "-Dquarkus.native.container-build=true" \
            "-Dquarkus.container-image.builder=docker" \
            "-Dquarkus.native.enabled=true" \
            "-Dquarkus.package.jar.enabled=false" \
            "-Dquarkus.container-image.build=true" \
            "-Dquarkus.container-image.push=true" \
            "-Dquarkus.container-image.group=bethibande" \
            "-Dquarkus.container-image.name=repository" \
            "-Dquarkus.container-image.tag=${{ github.event.inputs.version }}-${{ matrix.arch }}"

  create-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and Push Multi-Arch Manifest
        run: |
          # Create the Index (Manifest List) pointing to the two arch-specific images
          docker manifest create bethibande/repository:${{ github.event.inputs.version }} \
            --amend bethibande/repository:${{ github.event.inputs.version }}-amd64 \
            --amend bethibande/repository:${{ github.event.inputs.version }}-arm64
          
          # Push the Index to Docker Hub
          docker manifest push bethibande/repository:${{ github.event.inputs.version }}
