external.host=http://localhost:8080

quarkus.liquibase.change-log=classpath:liquibase/master.xml
quarkus.liquibase.migrate-at-start=true

quarkus.http.limits.max-body-size=10G
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.enable-forwarded-host=true

%dev.quarkus.hibernate-search-orm.elasticsearch.hosts=localhost:9200

%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/arcae
%dev.database.username=arcae
%dev.database.password=12345

%prod.quarkus.datasource.jdbc.url=${database.url}
quarkus.datasource.username=${database.username}
quarkus.datasource.password=${database.password}

%prod.quarkus.hibernate-search-orm.elasticsearch.hosts=${search.hosts}
quarkus.hibernate-search-orm.elasticsearch.version=8.13.4
quarkus.hibernate-search-orm.schema-management.strategy=none

quarkus.native.additional-build-args=--initialize-at-run-time=org.wildfly.security.util.PasswordUtil

quarkus.quinoa.package-manager-install=true
quarkus.quinoa.package-manager-install.node-version=24.6.0
quarkus.quinoa.package-manager-install.npm-version=11.5.1
quarkus.quinoa.enable-spa-routing=true
quarkus.quinoa.ignored-path-prefixes=/api,/repositories

quarkus.smallrye-openapi.store-schema-directory=build/openapi
quarkus.smallrye-openapi.auto-add-server=false

quarkus.http.auth.permission.roles.paths=/*
quarkus.http.auth.permission.roles.policy=permit

%dev.quarkus.datasource.dev-ui.allow-sql=true

quarkus.smallrye-openapi.open-api-version=3.0.3

# Will try to enable distributed mode (primarily used for job scheduling)
arcae.distributed=true
# Always disabled locally to ensure we don't connect to locally configured clusters on accident
%dev.arcae.distributed=false

# Labels used to select pods eligible for job scheduling
arcae.discovery.selector.jobs=app.kubernetes.io/name=arcae

# Labels used to select pods eligible for service discovery. This must always point to the frontend pods
arcae.discovery.selector.api=app.kubernetes.io/name=arcae

# The name of the DNS-only service used for pod discovery by the job scheduler if distributed mode is enabled
arcae.scheduler.discovery-service=arcae-pod-discovery

# Port for the internal management interface, only available
arcae.management.port=8081

# Rate limits
quarkus.rate-limiter.buckets.password-reset.limits[0].permitted-uses=6
quarkus.rate-limiter.buckets.password-reset.limits[0].period=15M
quarkus.rate-limiter.buckets.password-reset.limits[1].permitted-uses=15
quarkus.rate-limiter.buckets.password-reset.limits[1].period=24H
quarkus.rate-limiter.buckets.password-reset.shared=true

quarkus.rate-limiter.buckets.auth.limits[0].permitted-uses=20
quarkus.rate-limiter.buckets.auth.limits[0].period=1H

quarkus.rate-limiter.buckets.2fa-send.limits[0].permitted-uses=1
quarkus.rate-limiter.buckets.2fa-send.limits[0].period=1M

quarkus.rate-limiter.buckets.auth-refresh.limits[0].permitted-uses=100
quarkus.rate-limiter.buckets.auth-refresh.limits[0].period=1H

quarkus.rate-limiter.buckets.oci-blobs.limits[0].permitted-uses=100
quarkus.rate-limiter.buckets.oci-blobs.limits[0].period=1H
