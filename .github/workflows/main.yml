name: Manual Multi-Arch Native Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version (e.g., 1.0.0)'
        required: true
        default: 'latest'

jobs:
  build:
    name: Build Native Image
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Cache Node and NPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            server/src/main/webui/node_modules
          key: ${{ runner.os }}-${{ matrix.arch }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-node-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

        # This will fail due to the front-end build missing files.
        # The next step will generate these files.
        # This order is necessary since this step will generate the openapi-spec.
      - name: Quarkus App Parts Build
        run: ./gradlew :server:quarkusAppPartsBuild "-Pversion=${{ github.event.inputs.version }}"
        continue-on-error: true

      - name: Generate OpenAPI
        run: ./gradlew :server:openApiGenerate "-Pversion=${{ github.event.inputs.version }}"

      - name: Build and Push Arch-Specific Image
        run: |
          ./gradlew :server:build \
            "-Pversion=${{ github.event.inputs.version }}" \
            "-Dquarkus.native.container-build=true" \
            "-Dquarkus.container-image.builder=docker" \
            "-Dquarkus.native.enabled=true" \
            "-Dquarkus.package.jar.enabled=false" \
            "-Dquarkus.container-image.build=true" \
            "-Dquarkus.container-image.push=true" \
            "-Dquarkus.container-image.group=bethibande" \
            "-Dquarkus.container-image.name=arcae" \
            "-Dquarkus.container-image.tag=${{ github.event.inputs.version }}-${{ matrix.arch }}"

  create-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to repository
        uses: docker/login-action@v3
        with:
          registry: docker.bethibande.com
          username: ${{ secrets.REPOSITORY_USERNAME }}
          password: ${{ secrets.REPOSITORY_TOKEN }}

      - name: Create and Push Multi-Arch Manifest
        run: |
          docker buildx imagetools create -t bethibande/arcae:${{ github.event.inputs.version }} \
            bethibande/arcae:${{ github.event.inputs.version }}-amd64 \
            bethibande/arcae:${{ github.event.inputs.version }}-arm64
      
          # Create the latest tag
          docker buildx imagetools create -t bethibande/arcae:latest \
          bethibande/arcae:${{ github.event.inputs.version }}-amd64 \
          bethibande/arcae:${{ github.event.inputs.version }}-arm64
      - name: Create and Push Multi-Arch Manifest to private registry
        run: |
          docker buildx imagetools create -t docker.bethibande.com/bethibande/arcae:${{ github.event.inputs.version }}-amd64 \
            bethibande/arcae:${{ github.event.inputs.version }}-amd64

          docker buildx imagetools create -t docker.bethibande.com/bethibande/arcae:${{ github.event.inputs.version }}-arm64 \
            bethibande/arcae:${{ github.event.inputs.version }}-arm64


          docker buildx imagetools create -t docker.bethibande.com/bethibande/arcae:${{ github.event.inputs.version }} \
            docker.bethibande.com/bethibande/arcae:${{ github.event.inputs.version }}-amd64 \
            docker.bethibande.com/bethibande/arcae:${{ github.event.inputs.version }}-arm64

          docker buildx imagetools create -t docker.bethibande.com/bethibande/arcae:latest \
            docker.bethibande.com/bethibande/arcae:${{ github.event.inputs.version }}-amd64 \
            docker.bethibande.com/bethibande/arcae:${{ github.event.inputs.version }}-arm64
