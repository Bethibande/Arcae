name: Promote Multi-Arch Image

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'The existing tag to promote (e.g. 1.2.2-PRE1)'
        required: true
        type: string
      new_version:
        description: 'The new version tag to create (e.g. 1.2.2)'
        required: true
        type: string
      promote_to_latest:
        description: 'Also update the "latest" tag?'
        required: true
        type: boolean
        default: true

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Personal Registry
        uses: docker/login-action@v3
        with:
          registry: docker.bethibande.com
          username: ${{ secrets.REPOSITORY_USERNAME }}
          password: ${{ secrets.REPOSITORY_TOKEN }}

      # --- PROMOTE TO DOCKER HUB ---
      - name: Promote to Docker Hub (Versioned)
        run: |
          skopeo copy --multi-arch all \
            --authfile /home/runner/.docker/config.json \
            docker://docker.io/bethibande/arcae:${{ inputs.source_tag }} \
            docker://docker.io/bethibande/arcae:${{ inputs.new_version }}

      - name: Promote to Docker Hub (Latest)
        if: ${{ inputs.promote_to_latest == 'true' }}
        run: |
          skopeo copy --multi-arch all \
            --authfile /home/runner/.docker/config.json \
            docker://docker.io/bethibande/arcae:${{ inputs.source_tag }} \
            docker://docker.io/bethibande/arcae:latest

      # --- PROMOTE TO PERSONAL REGISTRY ---
      - name: Promote to Personal Registry (Versioned)
        run: |
          skopeo copy --multi-arch all \
            --authfile /home/runner/.docker/config.json \
            docker://docker.io/bethibande/arcae:${{ inputs.source_tag }} \
            docker://docker.bethibande.com/bethibande/arcae:${{ inputs.new_version }}

      - name: Promote to Personal Registry (Latest)
        if: ${{ inputs.promote_to_latest == 'true' }}
        run: |
          skopeo copy --multi-arch all \
            --authfile /home/runner/.docker/config.json \
            docker://docker.io/bethibande/arcae:${{ inputs.source_tag }} \
            docker://docker.bethibande.com/bethibande/arcae:latest
