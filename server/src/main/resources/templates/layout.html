<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title ?: 'Repository'}</title>
    <style>
        /* Base styles that work well across many email clients */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #09090b; /* Dark background */
            color: #fafafa; /* Light text */
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .header {
            margin-bottom: 1.5rem;
        }

        .header table, .header td, .header th {
            padding: 0;
        }

        .logo-box {
            background-color: #2563eb; /* primary color */
            border-radius: 1rem;
            display: block;
            padding: 0.5rem;
            overflow: hidden;
        }

        .logo-box img {
            display: block;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fafafa;
            letter-spacing: -0.025em;
            line-height: 1.5rem;
        }

        .content {
            font-size: 1rem;
            line-height: 1.6;
            color: #d4d4d8;
        }

        /* Link styling */
        a {
            color: #3b82f6;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Logo Section -->
    <div class="header">
        <table>
            <tr>

                </td>
                <td style="vertical-align: middle; padding-left: 0.5rem;">
                    <span class="logo-text">Repository</span>

    </div>

    <!-- Main Content Section -->

</div>
