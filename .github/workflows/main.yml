name: Manual Multi-Arch Native Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version (e.g., 1.0.0)'
        required: true
        default: 'latest'

jobs:
  build:
    name: Build Native Image
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            server/src/main/webui/node_modules
          key: ${{ runner.os }}-${{ matrix.arch }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-node-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Arch-Specific Image
        run: |
          ./gradlew :server:build \
            "-Dquarkus.quinoa.package-manager-install=true" \
            "-Dquarkus.quinoa.log-external-output=true" \
            "-Dquarkus.native.container-build=true" \
            "-Dquarkus.container-image.builder=docker" \
            "-Dquarkus.native.enabled=true" \
            "-Dquarkus.package.jar.enabled=false" \
            "-Dquarkus.container-image.build=true" \
            "-Dquarkus.container-image.push=true" \
            "-Dquarkus.container-image.group=bethibande" \
            "-Dquarkus.container-image.name=repository" \
            "-Dquarkus.container-image.tag=${{ github.event.inputs.version }}-${{ matrix.arch }}"

  create-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and Push Multi-Arch Manifest
        run: |
          docker manifest create bethibande/repository:${{ github.event.inputs.version }} \
            --amend bethibande/repository:${{ github.event.inputs.version }}-amd64 \
            --amend bethibande/repository:${{ github.event.inputs.version }}-arm64
          
          docker manifest push bethibande/repository:${{ github.event.inputs.version }}
